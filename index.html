<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Przenieśliśmy się — fortislly.pl</title>
<meta name="description" content="Nasz serwis przeniósł się na nowy adres: fortislly.pl">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#05070f;
    --deep:#0a1024;
    --ink:#e8ecf8;
    --muted:#8792b5;
    --gold:#e7c568;
    --gold-soft:#f3dfa0;
    --aurora-1:#2a4d7a;
    --aurora-2:#6a3d8c;
    --aurora-3:#1f6b6b;
  }

  *{margin:0;padding:0;box-sizing:border-box}

  html,body{height:100%}

  body{
    font-family:'Inter',system-ui,sans-serif;
    background:var(--void);
    color:var(--ink);
    overflow:hidden;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:2rem;
  }

  /* --- Aurora background --- */
  .aurora{
    position:fixed;
    inset:-20%;
    z-index:0;
    filter:blur(90px);
    opacity:.55;
    pointer-events:none;
  }
  .aurora span{
    position:absolute;
    border-radius:50%;
    mix-blend-mode:screen;
    animation:drift 22s ease-in-out infinite;
  }
  .aurora .a1{width:48vw;height:48vw;top:-8%;left:-6%;
    background:radial-gradient(circle,var(--aurora-1),transparent 68%);animation-delay:0s}
  .aurora .a2{width:42vw;height:42vw;bottom:-12%;right:-4%;
    background:radial-gradient(circle,var(--aurora-2),transparent 68%);animation-delay:-7s}
  .aurora .a3{width:38vw;height:38vw;top:30%;left:35%;
    background:radial-gradient(circle,var(--aurora-3),transparent 68%);animation-delay:-13s}

  @keyframes drift{
    0%,100%{transform:translate(0,0) scale(1)}
    33%{transform:translate(6vw,-4vh) scale(1.15)}
    66%{transform:translate(-5vw,5vh) scale(.9)}
  }

  /* --- Particle canvas --- */
  #particles{position:fixed;inset:0;z-index:1;pointer-events:none}

  /* --- Vignette --- */
  .vignette{
    position:fixed;inset:0;z-index:2;pointer-events:none;
    background:radial-gradient(ellipse at center,transparent 40%,rgba(3,4,10,.85) 100%);
  }

  /* --- Content card --- */
  .card{
    position:relative;
    z-index:3;
    max-width:640px;
    width:100%;
    text-align:center;
    padding:3.5rem 3rem;
    border-radius:24px;
    background:rgba(12,16,34,.42);
    border:1px solid rgba(231,197,104,.14);
    backdrop-filter:blur(14px) saturate(140%);
    -webkit-backdrop-filter:blur(14px) saturate(140%);
    box-shadow:0 30px 80px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.05);
  }

  .eyebrow{
    display:inline-block;
    font-size:.72rem;
    letter-spacing:.32em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:1.6rem;
    opacity:0;
    animation:rise .9s cubic-bezier(.2,.7,.2,1) .15s forwards;
  }
  .eyebrow::before,.eyebrow::after{
    content:"";display:inline-block;width:26px;height:1px;
    background:linear-gradient(90deg,transparent,var(--gold));
    vertical-align:middle;margin:0 .8em;
  }
  .eyebrow::after{background:linear-gradient(90deg,var(--gold),transparent)}

  h1{
    font-family:'Cormorant Garamond',serif;
    font-weight:600;
    font-size:clamp(2.4rem,7vw,4rem);
    line-height:1.08;
    letter-spacing:.01em;
    margin-bottom:1.2rem;
    opacity:0;
    animation:rise 1s cubic-bezier(.2,.7,.2,1) .3s forwards;
  }
  h1 .accent{
    color:var(--gold-soft);
    background:linear-gradient(120deg,var(--gold-soft),var(--gold),#c79b3d);
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;
  }

  p.sub{
    font-size:clamp(1rem,2.4vw,1.15rem);
    line-height:1.65;
    color:var(--muted);
    max-width:44ch;
    margin:0 auto 2.6rem;
    opacity:0;
    animation:rise 1s cubic-bezier(.2,.7,.2,1) .45s forwards;
  }

  .cta{
    display:inline-flex;
    align-items:center;
    gap:.7em;
    font-size:1.02rem;
    font-weight:500;
    letter-spacing:.02em;
    text-decoration:none;
    color:#1a1204;
    padding:1.05rem 2.4rem;
    border-radius:100px;
    background:linear-gradient(135deg,var(--gold-soft),var(--gold));
    box-shadow:0 10px 30px rgba(231,197,104,.28), inset 0 1px 0 rgba(255,255,255,.4);
    transition:transform .35s cubic-bezier(.2,.7,.2,1), box-shadow .35s ease;
    opacity:0;
    animation:rise 1s cubic-bezier(.2,.7,.2,1) .6s forwards;
  }
  .cta svg{transition:transform .35s cubic-bezier(.2,.7,.2,1)}
  .cta:hover{
    transform:translateY(-3px) scale(1.03);
    box-shadow:0 18px 48px rgba(231,197,104,.5), inset 0 1px 0 rgba(255,255,255,.5);
  }
  .cta:hover svg{transform:translateX(5px)}
  .cta:focus-visible{outline:2px solid var(--gold-soft);outline-offset:4px}

  .newaddr{
    display:block;
    margin-top:2.2rem;
    font-size:.82rem;
    letter-spacing:.06em;
    color:var(--muted);
    opacity:0;
    animation:rise 1s cubic-bezier(.2,.7,.2,1) .75s forwards;
  }
  .newaddr a{color:var(--gold);text-decoration:none;border-bottom:1px solid rgba(231,197,104,.3)}
  .newaddr a:hover{border-color:var(--gold)}

  @keyframes rise{
    from{opacity:0;transform:translateY(22px)}
    to{opacity:1;transform:translateY(0)}
  }

  @media(max-width:480px){
    .card{padding:2.6rem 1.6rem}
  }

  @media(prefers-reduced-motion:reduce){
    *,.aurora span{animation:none!important}
    .eyebrow,h1,p.sub,.cta,.newaddr{opacity:1!important;transform:none!important}
  }
</style>
</head>
<body>

  <div class="aurora" aria-hidden="true">
    <span class="a1"></span>
    <span class="a2"></span>
    <span class="a3"></span>
  </div>

  <canvas id="particles" aria-hidden="true"></canvas>
  <div class="vignette" aria-hidden="true"></div>

  <main class="card">
    <span class="eyebrow">Nowy adres</span>
    <h1>Przenieśliśmy się na&nbsp;<span class="accent">fortislly.pl</span></h1>
    <p class="sub">Nasz serwis działa teraz na nowym, szybszym hostingu. Zaktualizuj zakładki i&nbsp;odwiedź nas pod nowym adresem — wszystko, co znasz, czeka tam na Ciebie.</p>
    <a class="cta" href="https://fortislly.pl">
      Przejdź na stronę
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </a>
    <span class="newaddr">Nowy adres: <a href="https://fortislly.pl">fortislly.pl</a></span>
  </main>

<script>
(function(){
  const canvas=document.getElementById('particles');
  const ctx=canvas.getContext('2d');
  const reduce=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  let w,h,particles=[];

  function resize(){
    w=canvas.width=innerWidth;
    h=canvas.height=innerHeight;
    const count=Math.min(90,Math.floor(w*h/16000));
    particles=Array.from({length:count},()=>({
      x:Math.random()*w,
      y:Math.random()*h,
      r:Math.random()*1.6+.4,
      vx:(Math.random()-.5)*.25,
      vy:(Math.random()-.5)*.25,
      a:Math.random()*.5+.2
    }));
  }

  function draw(){
    ctx.clearRect(0,0,w,h);
    for(let i=0;i<particles.length;i++){
      const p=particles[i];
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=w;if(p.x>w)p.x=0;
      if(p.y<0)p.y=h;if(p.y>h)p.y=0;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle='rgba(231,197,104,'+p.a+')';
      ctx.fill();
      for(let j=i+1;j<particles.length;j++){
        const q=particles[j];
        const dx=p.x-q.x,dy=p.y-q.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<120){
          ctx.beginPath();
          ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);
          ctx.strokeStyle='rgba(231,197,104,'+(1-d/120)*.12+')';
          ctx.lineWidth=.6;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }

  resize();
  addEventListener('resize',resize);
  if(!reduce)draw();
})();
</script>
</body>
</html>
